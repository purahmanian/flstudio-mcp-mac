name: Release

# On a version tag: test, build wheel/sdist + MCPB, attach to a GitHub Release,
# publish to PyPI via OIDC trusted publishing, then publish metadata to the
# official MCP registry via GitHub OIDC. No tokens or secrets anywhere.

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install ".[dev]" build
          .venv/bin/python -m pytest -q
          .venv/bin/python -m ruff check .

      - name: Build wheel and sdist
        run: .venv/bin/python -m build

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build MCPB bundle
        run: |
          npx -y @anthropic-ai/mcpb validate manifest.json
          npx -y @anthropic-ai/mcpb pack . "dist/flstudio-mcp-mac-${GITHUB_REF_NAME#v}.mcpb"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Remove non-PyPI artifacts
        run: rm -f dist/*.mcpb

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  registry-publish:
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "import json;f='server.json';j=json.load(open(f));j['version']='$VERSION';j['packages'][0]['version']='$VERSION';json.dump(j,open(f,'w'),indent=2);open(f,'a').write('\n')"

      - name: Publish to MCP registry (GitHub OIDC)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
